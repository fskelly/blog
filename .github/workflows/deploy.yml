name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate Tina secrets
        env:
          TINACLIENTID: ${{ secrets.TINACLIENTID }}
          TINATOKEN: ${{ secrets.TINATOKEN }}
          TINASEARCH: ${{ secrets.TINASEARCH }}
        run: |
          test -n "$TINACLIENTID" || (echo "Missing GitHub secret: TINACLIENTID" && exit 1)
          test -n "$TINATOKEN" || (echo "Missing GitHub secret: TINATOKEN" && exit 1)
          test -n "$TINASEARCH" || (echo "Missing GitHub secret: TINASEARCH" && exit 1)

      - name: Build site
        env:
          TINACLIENTID: ${{ secrets.TINACLIENTID }}
          TINATOKEN: ${{ secrets.TINATOKEN }}
          TINASEARCH: ${{ secrets.TINASEARCH }}
        run: |
          # Try TinaCMS build but don't block deployment if it fails
          npx tinacms build || echo "TinaCMS build failed, continuing with Astro build"
          npx astro build
          npx pagefind --site dist

      - name: Verify build output
        run: |
          test -d dist || (echo "dist folder was not generated" && exit 1)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
